<!DOCTYPE html>
<html>
<head>
    <title>Disaster Response Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .chat-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h2 {
            color: #667eea;
            margin-top: 0;
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 20px;
            background: #fafafa;
            border-radius: 10px;
        }
        .user-message {
            text-align: right;
            background: #667eea;
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
        }
        .bot-message {
            text-align: left;
            background: #e9ecef;
            color: #333;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #764ba2;
        }
        .status {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        .status.online {
            background: #d4edda;
            color: #155724;
        }
        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>🌊 AI Disaster Response Assistant</h2>
        
        <div id="status" class="status offline">Checking connection...</div>
        
        <div id="messages" class="messages">
            <div class="bot-message">🤖 Hello! I'm your disaster response assistant. Ask me about floods, earthquakes, landslides, or emergency preparedness!</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your question here..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Change this to your backend port (3000, 5000, 8000, 8080, etc.)
        const BACKEND_URL = 'http://127.0.0.1:3000';
        let sessionId = 'user_' + Date.now();
        
        async function checkConnection() {
            try {
                const response = await fetch(`${BACKEND_URL}/health`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('status').innerHTML = `✅ Connected to backend on port ${data.port || BACKEND_URL.split(':')[2]}`;
                    document.getElementById('status').className = 'status online';
                    return true;
                } else {
                    throw new Error('Backend not responding');
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Backend not connected. Please start the backend server';
                document.getElementById('status').className = 'status offline';
                return false;
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage(message, 'user');
            input.value = '';
            
            // Show typing indicator
            showTyping();
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/v1/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });
                
                hideTyping();
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        addMessage(data.response, 'bot');
                    } else {
                        addMessage('Sorry, I encountered an error. Please try again.', 'bot');
                    }
                } else {
                    addMessage(`Error: Backend returned status ${response.status}`, 'bot');
                }
            } catch (error) {
                hideTyping();
                addMessage('❌ Cannot connect to backend. Make sure the server is running.', 'bot');
                console.error('Error:', error);
            }
        }
        
        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = sender === 'user' ? 'user-message' : 'bot-message';
            messageDiv.innerHTML = text.replace(/\n/g, '<br>');
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showTyping() {
            const messagesDiv = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'bot-message';
            typingDiv.innerHTML = '🤖 Typing...';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function hideTyping() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }
        
        // Initialize
        checkConnection();
        setInterval(checkConnection, 10000);
    </script>
</body>
</html>
