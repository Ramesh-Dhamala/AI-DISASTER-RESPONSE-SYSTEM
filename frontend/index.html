<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Disaster Response System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 5px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .alert-high {
            background: #ff4444;
            color: white;
        }

        .alert-medium {
            background: #ffaa44;
            color: white;
        }

        .alert-low {
            background: #44ff44;
            color: #333;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .chat-box {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }

        .chat-message {
            margin: 10px 0;
            padding: 8px 12px;
            border-radius: 10px;
            max-width: 80%;
        }

        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
            text-align: right;
        }

        .bot-message {
            background: #e0e0e0;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 AI Disaster Response System 🏔️</h1>
        
        <div class="grid">
            <!-- Flood Prediction Card -->
            <div class="card">
                <h2>🌊 Flood Prediction</h2>
                <div class="form-group">
                    <label>Rainfall (mm)</label>
                    <input type="number" id="flood_rainfall" placeholder="e.g., 150">
                </div>
                <div class="form-group">
                    <label>River Level (m)</label>
                    <input type="number" id="flood_river_level" placeholder="e.g., 6.5">
                </div>
                <div class="form-group">
                    <label>Humidity (%)</label>
                    <input type="number" id="flood_humidity" placeholder="e.g., 85">
                </div>
                <div class="form-group">
                    <label>Temperature (°C)</label>
                    <input type="number" id="flood_temperature" placeholder="e.g., 28">
                </div>
                <button onclick="predictFlood()">Predict Flood Risk</button>
                <div id="floodResult" class="result"></div>
            </div>

            <!-- Landslide Prediction Card -->
            <div class="card">
                <h2>🏔️ Landslide Prediction</h2>
                <div class="form-group">
                    <label>Rainfall (mm)</label>
                    <input type="number" id="landslide_rainfall" placeholder="e.g., 120">
                </div>
                <div class="form-group">
                    <label>Slope Angle (degrees)</label>
                    <input type="number" id="landslide_slope" placeholder="e.g., 35">
                </div>
                <div class="form-group">
                    <label>Soil Moisture (%)</label>
                    <input type="number" id="landslide_soil_moisture" placeholder="e.g., 80">
                </div>
                <button onclick="predictLandslide()">Predict Landslide Risk</button>
                <div id="landslideResult" class="result"></div>
            </div>

            <!-- Earthquake Prediction Card -->
            <div class="card">
                <h2>🌍 Earthquake Prediction</h2>
                <div class="form-group">
                    <label>Latitude</label>
                    <input type="number" id="earthquake_lat" placeholder="e.g., 35.0" step="any">
                </div>
                <div class="form-group">
                    <label>Longitude</label>
                    <input type="number" id="earthquake_lon" placeholder="e.g., 135.0" step="any">
                </div>
                <button onclick="predictEarthquake()">Predict Earthquake Risk</button>
                <div id="earthquakeResult" class="result"></div>
            </div>

            <!-- Chatbot Card -->
            <div class="card">
                <h2>🤖 AI Assistant</h2>
                <div class="chat-box" id="chatBox">
                    <div class="chat-message bot-message">Hello! I'm your disaster response assistant. Ask me about floods, earthquakes, landslides, or safety tips!</div>
                </div>
                <div class="form-group">
                    <textarea id="chatMessage" rows="2" placeholder="Type your question here..."></textarea>
                </div>
                <button onclick="sendMessage()">Send Message</button>
            </div>
        </div>

        <!-- Map Card -->
        <div class="card">
            <h2>🗺️ Disaster Zones Map</h2>
            <button onclick="loadDisasterZones()">Load Disaster Zones</button>
            <div id="mapResult" class="result"></div>
        </div>
    </div>

    <script>
        // API Base URL - Change this to your backend URL
        const API_BASE_URL = 'http://127.0.0.1:8000/api/v1';

        // Flood Prediction
        async function predictFlood() {
            const data = {
                rainfall: parseFloat(document.getElementById('flood_rainfall').value) || 0,
                river_level: parseFloat(document.getElementById('flood_river_level').value) || 0,
                humidity: parseFloat(document.getElementById('flood_humidity').value) || 0,
                temperature: parseFloat(document.getElementById('flood_temperature').value) || 0
            };

            showLoading('floodResult');
            
            try {
                const response = await fetch(`${API_BASE_URL}/flood/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                displayResult('floodResult', result);
            } catch (error) {
                displayError('floodResult', error.message);
            }
        }

        // Landslide Prediction
        async function predictLandslide() {
            const data = {
                rainfall: parseFloat(document.getElementById('landslide_rainfall').value) || 0,
                slope: parseFloat(document.getElementById('landslide_slope').value) || 0,
                soil_moisture: parseFloat(document.getElementById('landslide_soil_moisture').value) || 0
            };

            showLoading('landslideResult');
            
            try {
                const response = await fetch(`${API_BASE_URL}/landslide/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                displayResult('landslideResult', result);
            } catch (error) {
                displayError('landslideResult', error.message);
            }
        }

        // Earthquake Prediction
        async function predictEarthquake() {
            const data = {
                latitude: parseFloat(document.getElementById('earthquake_lat').value) || 0,
                longitude: parseFloat(document.getElementById('earthquake_lon').value) || 0
            };

            showLoading('earthquakeResult');
            
            try {
                const response = await fetch(`${API_BASE_URL}/earthquake/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                displayResult('earthquakeResult', result);
            } catch (error) {
                displayError('earthquakeResult', error.message);
            }
        }

        // Chatbot
        async function sendMessage() {
            const message = document.getElementById('chatMessage').value;
            if (!message.trim()) return;

            // Add user message to chat
            addChatMessage(message, 'user');
            document.getElementById('chatMessage').value = '';

            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                
                const result = await response.json();
                addChatMessage(result.response, 'bot');
            } catch (error) {
                addChatMessage('Sorry, I\'m having trouble connecting. Please try again.', 'bot');
            }
        }

        // Load Disaster Zones
        async function loadDisasterZones() {
            showLoading('mapResult');
            
            try {
                const response = await fetch(`${API_BASE_URL}/map/disaster-zones`);
                const result = await response.json();
                
                const mapDiv = document.getElementById('mapResult');
                mapDiv.innerHTML = '<h3>Disaster Zones</h3>';
                
                if (result.zones && result.zones.length > 0) {
                    result.zones.forEach(zone => {
                        const alertClass = zone.risk_level === 'high' ? 'alert-high' : 
                                         zone.risk_level === 'medium' ? 'alert-medium' : 'alert-low';
                        mapDiv.innerHTML += `
                            <div class="result show ${alertClass}" style="margin-bottom: 10px;">
                                <strong>Zone ${zone.zone_id}</strong><br>
                                Type: ${zone.type}<br>
                                Risk Level: ${zone.risk_level.toUpperCase()}<br>
                                Alerts: ${zone.alert_count}
                            </div>
                        `;
                    });
                } else {
                    mapDiv.innerHTML += '<p>No disaster zones found.</p>';
                }
                mapDiv.classList.add('show');
            } catch (error) {
                displayError('mapResult', error.message);
            }
        }

        // Helper Functions
        function showLoading(elementId) {
            const element = document.getElementById(elementId);
            element.innerHTML = '<div class="loading show">Loading...</div>';
            element.classList.add('show');
        }

        function displayResult(elementId, result) {
            const element = document.getElementById(elementId);
            const alertClass = result.risk_level === 'HIGH' ? 'alert-high' : 
                             result.risk_level === 'MEDIUM' ? 'alert-medium' : 'alert-low';
            
            element.innerHTML = `
                <div class="result show ${alertClass}">
                    <strong>Risk Level: ${result.risk_level}</strong><br>
                    Alert: ${result.alert ? '⚠️ Yes' : '✅ No'}<br>
                    Message: ${result.message}<br>
                    ${result.probability ? `Probability: ${(result.probability * 100).toFixed(1)}%` : ''}
                </div>
            `;
        }

        function displayError(elementId, error) {
            const element = document.getElementById(elementId);
            element.innerHTML = `
                <div class="result show" style="background: #ff4444; color: white;">
                    ❌ Error: ${error}<br>
                    Make sure the backend server is running at ${API_BASE_URL}
                </div>
            `;
        }

        function addChatMessage(message, sender) {
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${sender}-message`;
            messageDiv.textContent = message;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
