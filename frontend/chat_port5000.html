<!DOCTYPE html>
<html>
<head>
    <title>Disaster Response Chatbot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .chat-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h2 {
            color: #667eea;
            margin-top: 0;
        }
        .messages {
            height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 20px;
            background: #fafafa;
            border-radius: 10px;
        }
        .user-msg {
            text-align: right;
            margin: 10px 0;
            padding: 10px;
            background: #667eea;
            color: white;
            border-radius: 10px;
            display: inline-block;
            float: right;
            clear: both;
            max-width: 70%;
        }
        .bot-msg {
            text-align: left;
            margin: 10px 0;
            padding: 10px;
            background: #e9ecef;
            color: #333;
            border-radius: 10px;
            display: inline-block;
            float: left;
            clear: both;
            max-width: 70%;
            white-space: pre-wrap;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #764ba2;
        }
        .status {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        .status.online {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.offline {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .suggestions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .suggestion {
            padding: 8px 15px;
            background: #f0f0f0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }
        .suggestion:hover {
            background: #667eea;
            color: white;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>🌊 AI Disaster Response Assistant</h2>
        
        <div id="status" class="status offline">Checking connection...</div>
        
        <div id="messages" class="messages clearfix">
            <div class="bot-msg">🤖 Hello! I'm your disaster response assistant. Ask me about floods, earthquakes, landslides, or emergency preparedness!</div>
            <div class="clearfix"></div>
        </div>
        
        <div class="suggestions">
            <div class="suggestion" onclick="sendMessageText('What to do during a flood?')">🌊 Flood Safety</div>
            <div class="suggestion" onclick="sendMessageText('Earthquake safety tips')">🏠 Earthquake</div>
            <div class="suggestion" onclick="sendMessageText('What should I have in my emergency kit?')">🎒 Emergency Kit</div>
            <div class="suggestion" onclick="sendMessageText('How to prepare for a cyclone?')">🌀 Cyclone</div>
            <div class="suggestion" onclick="sendMessageText('Landslide warning signs')">⛰️ Landslide</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type your question here..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://127.0.0.1:5000';
        let sessionId = 'user_' + Date.now();
        
        async function checkConnection() {
            try {
                const response = await fetch(`${BACKEND_URL}/health`);
                if (response.ok) {
                    document.getElementById('status').innerHTML = '✅ Connected to backend on port 5000';
                    document.getElementById('status').className = 'status online';
                    return true;
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ Backend not connected. Please start the backend server on port 5000';
                document.getElementById('status').className = 'status offline';
                return false;
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            sendMessageText(message);
        }
        
        async function sendMessageText(message) {
            addMessage(message, 'user');
            document.getElementById('messageInput').value = '';
            showTyping();
            
            try {
                const response = await fetch(`${BACKEND_URL}/api/v1/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });
                
                hideTyping();
                
                if (response.ok) {
                    const data = await response.json();
                    addMessage(data.response, 'bot');
                } else {
                    addMessage('Sorry, I encountered an error.', 'bot');
                }
            } catch (error) {
                hideTyping();
                addMessage('❌ Cannot connect to backend. Make sure the server is running on port 5000', 'bot');
            }
        }
        
        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = sender === 'user' ? 'user-msg' : 'bot-msg';
            msgDiv.style.cssText = sender === 'user' ? 'float: right; clear: both;' : 'float: left; clear: both;';
            msgDiv.innerHTML = text.replace(/\n/g, '<br>');
            messagesDiv.appendChild(msgDiv);
            
            const clearfix = document.createElement('div');
            clearfix.className = 'clearfix';
            messagesDiv.appendChild(clearfix);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showTyping() {
            const messagesDiv = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'bot-msg';
            typingDiv.style.cssText = 'float: left; clear: both;';
            typingDiv.innerHTML = '🤖 Typing...';
            messagesDiv.appendChild(typingDiv);
            
            const clearfix = document.createElement('div');
            clearfix.className = 'clearfix';
            messagesDiv.appendChild(clearfix);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function hideTyping() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }
        
        checkConnection();
        setInterval(checkConnection, 10000);
    </script>
</body>
</html>
